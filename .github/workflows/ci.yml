name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: cargo test
        run: cargo test

      - name: cargo test (bolt-core interop)
        run: |
          git clone --depth 1 https://github.com/the9ines/bolt-core-sdk.git ../bolt-core-sdk
          cargo add bolt-core --optional --path ../bolt-core-sdk/rust/bolt-core
          sed -i 's/with-bolt-core-tests = \[\]/with-bolt-core-tests = ["bolt-core"]/' Cargo.toml
          cargo test --features with-bolt-core-tests
          git checkout -- Cargo.toml Cargo.lock
