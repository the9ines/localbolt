name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  signal-server:
    name: Signal Server (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: signal
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: signal
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test
      - run: cargo build --release

  web-app:
    name: Web App (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Registry mapping guard (D5)
        working-directory: .
        run: bash scripts/check-registry-mapping.sh
      - name: Transport version pin guard
        working-directory: .
        run: bash scripts/check-transport-version-pin.sh
      - name: Core version pin guard
        working-directory: .
        run: bash scripts/check-core-version-pin.sh
      - run: npm ci
      - name: Lockfile registry guard (D5)
        working-directory: .
        run: bash scripts/check-lockfile-registry.sh
      - name: Transport single-install guard
        working-directory: .
        run: bash scripts/check-transport-single-install.sh
      - name: Core single-install guard
        working-directory: .
        run: bash scripts/check-core-single-install.sh
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run build
      - name: Transport drift guard
        run: bash ../scripts/check-transport-drift.sh src
      - name: Core drift guard
        run: bash ../scripts/check-core-drift.sh src
      - uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2
        with:
          file: web/coverage/lcov.info
          flag-name: web

  subtree-drift-guard:
    name: Signal Subtree Drift Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read subtree pin
        shell: bash
        run: |
          set -euo pipefail
          source SIGNAL_SUBTREE_PIN
          echo "UPSTREAM_REPO=$UPSTREAM_REPO" >> "$GITHUB_ENV"
          echo "UPSTREAM_TAG=$UPSTREAM_TAG" >> "$GITHUB_ENV"

      - name: Checkout canonical bolt-rendezvous
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ env.UPSTREAM_TAG }}
          path: canonical-rendezvous
          fetch-depth: 1

      - name: Sanity check canonical
        run: test -f canonical-rendezvous/Cargo.toml

      - name: Verify signal subtree
        run: CANONICAL_DIR="$GITHUB_WORKSPACE/canonical-rendezvous" bash scripts/verify_signal_subtree.sh
