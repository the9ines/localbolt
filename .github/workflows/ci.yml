name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: cargo test
        run: cargo test

      - name: Checkout bolt-core-sdk (sibling, pinned)
        uses: actions/checkout@v4
        with:
          repository: the9ines/bolt-core-sdk
          ref: 1694aa62f577eda9fd748017c43bc960bc4462ff
          path: ../bolt-core-sdk
          fetch-depth: 1

      - name: Verify sibling layout
        run: |
          pwd
          ls -la ..
          test -d ../bolt-core-sdk/rust/bolt-core

      - name: cargo test (bolt-core interop crate)
        run: cargo test --manifest-path interop-tests/Cargo.toml
