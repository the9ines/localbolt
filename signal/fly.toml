app = "bolt-rendezvous"
primary_region = "dfw"

[build]

[env]
  BOLT_SIGNAL_PROFILE = "internet"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
